name: 05 - Smoke Test Running App

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/main/**"
      - "src/test/java/test/LocalRunner.java"
      - "pom.xml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Start app in background
        run: |
          mkdir -p target
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > target/home.html; then
              exit 0
            fi
            sleep 1
          done
          echo "application did not become ready"
          cat target/local-runner.log
          exit 1
      - name: Assert page looks correct
        run: grep -qi "todo" target/home.html
      - name: Stop app
        if: always()
        run: kill "$(cat target/local-runner.pid)" || true
      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: target/local-runner.log
          retention-days: 7
