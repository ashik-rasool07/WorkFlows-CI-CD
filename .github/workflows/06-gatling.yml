name: 06 - Performance Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gatling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Start app in background
        run: |
          mkdir -p target
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "application did not become ready"
          cat target/local-runner.log
          exit 1
      - name: Run Gatling simulation
        run: ./mvnw -B test -P gatling
      - name: Stop app
        if: always()
        run: kill "$(cat target/local-runner.pid)" || true
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: target/gatling
          retention-days: 14
