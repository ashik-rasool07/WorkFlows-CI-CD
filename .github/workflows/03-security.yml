name: 03 - Security Checks

on:
  workflow_run:
    workflows:
      - 02 - UI And Smoke
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  codeql:
    name: Run CodeQL
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # Download the repository so CodeQL can inspect the Java source.
      - uses: actions/checkout@v4

      # Initialize CodeQL with the Java/Kotlin analyzer.
      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      # Install Java so CodeQL can build the project before analysis.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Let CodeQL infer the build steps automatically.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Publish findings to the repository security tab.
      - name: Analyze code
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Scan for secrets
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # Pull the tracked files onto the runner so grep can inspect them.
      - uses: actions/checkout@v4

      # Search for common token and private-key patterns in source-controlled files.
      - name: Scan tracked files
        shell: bash
        run: |
          set -euo pipefail
          pattern='Bearer [A-Za-z0-9_.-]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          matches=$(git ls-files | grep -Ev '(^target/|\.png$|\.jpg$|\.jpeg$|\.ico$|\.jar$|\.bin$)' | xargs -r grep -En "$pattern" || true)
          if [ -n "$matches" ]; then
            echo "::error::possible secret found"
            echo "$matches"
            exit 1
          fi
          echo "no secret patterns matched"
