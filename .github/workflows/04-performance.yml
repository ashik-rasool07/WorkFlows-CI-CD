name: 04 - Performance

on:
  workflow_run:
    workflows:
      - 03 - Security Checks
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gatling:
    name: Run Gatling smoke
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # Pull the app and tests onto the runner.
      - uses: actions/checkout@v4

      # Install Java for the local server and Gatling plugin.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Start the TODO app so Gatling can hit a live endpoint.
      - name: Start app
        shell: bash
        run: |
          mkdir -p target
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/ > /dev/null || (echo "app did not start"; cat target/local-runner.log; exit 1)

      # Execute the performance smoke profile.
      - name: Run simulation
        run: ./mvnw -B test -P gatling

      # Stop the background app process after the load run.
      - name: Stop app
        if: always()
        shell: bash
        run: kill "$(cat target/local-runner.pid)" || true

      # Preserve the Gatling HTML output for review.
      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: target/gatling
          retention-days: 7
