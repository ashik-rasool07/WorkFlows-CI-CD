name: 09 - Secret Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for common secret patterns
        shell: bash
        run: |
          set -euo pipefail
          pattern='Bearer [A-Za-z0-9_.-]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          matches=$(git ls-files | grep -Ev '(^target/|\.png$|\.jpg$|\.jpeg$|\.ico$|\.jar$|\.bin$)' | xargs -r grep -En "$pattern" || true)
          if [ -n "$matches" ]; then
            echo "::error::possible secret found"
            echo "$matches"
            exit 1
          fi
          echo "no secret patterns matched"
