name: CI/CD Learning Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: 01 - Validate build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven validate
        run: ./mvnw -B validate

  api-tests:
    name: 02 - API tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run API suite
        run: ./mvnw -B test
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports
          retention-days: 14

  ui-tests:
    name: 03 - UI tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run UI suite
        run: ./mvnw -B verify -Pui
      - name: Upload UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: target/karate-reports
          retention-days: 14

  package:
    name: 04 - Package artifact
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build jar
        run: ./mvnw -B -DskipTests package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 14

  smoke-test:
    name: 05 - Smoke test app
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Start app in background
        shell: bash
        run: |
          mkdir -p target
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > target/home.html; then
              break
            fi
            sleep 1
          done
          test -f target/home.html || (echo "app did not start"; cat target/local-runner.log; exit 1)
      - name: Assert home page
        shell: bash
        run: grep -qi "todo" target/home.html
      - name: Stop app
        if: always()
        shell: bash
        run: kill "$(cat target/local-runner.pid)" || true
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: target/local-runner.log
          retention-days: 7

  gatling:
    name: 06 - Performance smoke
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Start app in background
        shell: bash
        run: |
          mkdir -p target
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/ > /dev/null || (echo "app did not start"; cat target/local-runner.log; exit 1)
      - name: Run Gatling simulation
        run: ./mvnw -B test -P gatling
      - name: Stop app
        if: always()
        shell: bash
        run: kill "$(cat target/local-runner.pid)" || true
      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: target/gatling
          retention-days: 14

  dependencies:
    name: 07 - Dependency snapshot
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Generate dependency tree
        run: ./mvnw -B dependency:tree -DoutputFile=target/dependency-tree.txt
      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: target/dependency-tree.txt
          retention-days: 7

  codeql:
    name: 08 - CodeQL
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    name: 09 - Secret scan
    needs:
      - api-tests
      - gatling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files
        shell: bash
        run: |
          set -euo pipefail
          pattern='Bearer [A-Za-z0-9_.-]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          matches=$(git ls-files | grep -Ev '(^target/|\.png$|\.jpg$|\.jpeg$|\.ico$|\.jar$|\.bin$)' | xargs -r grep -En "$pattern" || true)
          if [ -n "$matches" ]; then
            echo "::error::possible secret found"
            echo "$matches"
            exit 1
          fi
          echo "no secret patterns matched"
      - uses: actions/download-artifact@v4
        with:
          name: karate-report
          path: reports/karate
      - uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: reports/gatling
      - name: Scan reports
        shell: bash
        run: |
          set +e
          pattern='Bearer [A-Za-z0-9_.-]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          matches=$(grep -REn "$pattern" reports/ || true)
          if [ -n "$matches" ]; then
            echo "::error::secrets found in reports"
            echo "$matches"
            exit 1
          fi
          echo "no report secret patterns matched"

  publish:
    name: 10 - Publish reports
    if: github.ref == 'refs/heads/main'
    needs:
      - api-tests
      - ui-tests
      - gatling
      - secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: karate-report
          path: public/latest/karate
      - uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: public/latest/gatling-raw
      - name: Flatten Gatling output
        shell: bash
        run: |
          sim=$(find public/latest/gatling-raw -maxdepth 1 -type d -name 'todosimulation-*' | head -1)
          test -n "$sim" || (echo "gatling output not found"; exit 1)
          mv "$sim" public/latest/gatling
          rm -rf public/latest/gatling-raw
      - name: Generate index
        shell: bash
        run: |
          cat > public/latest/index.html <<'HTML'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>karate-todo reports</title>
          <style>body{font-family:system-ui,sans-serif;max-width:48rem;margin:3rem auto;padding:0 1rem}
          a{display:block;padding:.5rem 0}</style></head>
          <body>
            <h1>karate-todo latest CI reports</h1>
            <p>Published from <code>main</code>.</p>
            <a href="karate/">Karate report</a>
            <a href="gatling/">Gatling report</a>
          </body>
          </html>
          HTML
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=latest/"></head>
          <body><a href="latest/">latest reports</a></body>
          </html>
          HTML
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          keep_files: false
